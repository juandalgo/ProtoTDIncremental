<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Horde Cleaver v3</title>
<style>
*{box-sizing:border-box;user-select:none;}
body{margin:0;padding:0;background:#0b0e14;color:#e2e8f0;font-family:'Courier New',monospace;overflow:hidden;display:flex;height:100vh;cursor:none;}
#game-container{position:relative;flex-grow:1;height:100vh;background:radial-gradient(circle,#1a1f2c 0%,#0b0e14 100%);cursor:none;}
canvas{display:block;width:100%;height:100%;cursor:none;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(11,14,20,.93);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:25;text-align:center;padding:20px;cursor:none;}
.start-btn{cursor:none;}
#hud{position:absolute;top:16px;left:16px;pointer-events:none;text-shadow:2px 2px 4px rgba(0,0,0,.8);z-index:20;}
.hud-row{display:flex;gap:18px;align-items:baseline;flex-wrap:wrap;}
.stat{font-size:1.1rem;font-weight:bold;}
#gold-hud{color:#ffd700;font-size:1.6rem;font-weight:bold;}
#hp-hud{color:#ff4757;}
#timer-hud{color:#535c68;font-size:2rem;font-family:monospace;}
#level-hud{color:#a29bfe;font-size:1rem;font-weight:bold;}
#boss-bar-wrap{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:340px;display:none;z-index:21;}
#boss-bar-label{text-align:center;font-size:.85rem;color:#ff6b6b;font-weight:bold;margin-bottom:3px;letter-spacing:1px;}
#boss-bar-bg{background:#1c202c;border-radius:5px;height:16px;border:1px solid #ff6b6b;}
#boss-bar{height:100%;background:linear-gradient(90deg,#ff4757,#ff6b6b);border-radius:5px;transition:width .1s;}
.timer-active{color:#2ed573!important;animation:pulse 1s infinite alternate;}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
#shop-panel{width:370px;background:#151a26;border-left:3px solid #232b3e;display:flex;flex-direction:column;z-index:30;box-shadow:-5px 0 15px rgba(0,0,0,.5);}
#shop-top{padding:12px 16px 0;border-bottom:2px solid #232b3e;}
#shop-gold{color:#ffd700;font-size:1.3rem;font-weight:bold;text-align:center;padding:6px 0;}
#shop-level-badge{background:#341f97;color:#a29bfe;font-size:.75rem;font-weight:bold;padding:3px 10px;border-radius:20px;text-align:center;margin-bottom:6px;letter-spacing:1px;}
.shop-tabs{display:flex;gap:0;margin-top:6px;}
.tab-btn{flex:1;background:#1c202c;border:none;color:#718093;padding:7px 4px;font-size:.75rem;cursor:pointer;font-family:monospace;border-bottom:2px solid transparent;transition:all .1s;}
.tab-btn.active{color:#00d2d3;border-bottom-color:#00d2d3;background:#232b3e;}
.tab-btn:hover:not(.active){color:#a4b0be;background:#232b3e;}
#upgrades-container{flex:1;overflow-y:auto;padding:10px 12px;}
.section-label{font-size:.7rem;color:#535c68;border-top:1px solid #232b3e;margin:6px 0 4px;padding-top:4px;font-weight:bold;letter-spacing:1px;}
.upgrade-btn{width:100%;background:#232b3e;border:1.5px solid #341f97;color:#fff;padding:8px 10px;margin-bottom:7px;border-radius:5px;cursor:pointer;text-align:left;transition:all .1s;display:flex;justify-content:space-between;align-items:center;}
.upgrade-btn:hover:not(:disabled){background:#341f97;border-color:#5f27cd;}
.upgrade-btn:disabled{background:#1c202c;border-color:#2c3243;color:#57606f;cursor:not-allowed;}
.up-info{display:flex;flex-direction:column;max-width:76%;}
.up-name{font-weight:bold;font-size:.82rem;color:#ff9ff3;}
.up-desc{font-size:.65rem;color:#a4b0be;margin-top:1px;}
.up-cost{font-weight:bold;color:#ffd700;font-size:.9rem;white-space:nowrap;}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(11,14,20,.93);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:25;text-align:center;padding:20px;cursor:none;}
.overlay h1{font-size:2.2rem;margin-bottom:8px;}
.overlay p{font-size:1rem;margin-bottom:8px;color:#a4b0be;}
.start-btn{background:#10ac84;color:#fff;border:none;padding:11px 32px;font-size:1.2rem;font-weight:bold;border-radius:8px;cursor:none;margin-top:8px;}
.start-btn:hover{background:#1dd1a1;}
.hidden{display:none!important;}
#round-stats-box{display:flex;gap:14px;margin:8px 0 14px;flex-wrap:wrap;justify-content:center;}
.stat-card{background:#1c202c;border:1px solid #2c3243;border-radius:7px;padding:8px 14px;min-width:120px;text-align:center;}
.stat-card .sc-label{font-size:.65rem;color:#718093;text-transform:uppercase;letter-spacing:1px;}
.stat-card .sc-value{font-size:1.3rem;font-weight:bold;margin-top:2px;}
.stat-card .sc-record{font-size:.6rem;color:#535c68;margin-top:2px;}
.stat-card.best .sc-value{color:#ffd700;}
#diff-bar-wrap{position:absolute;bottom:14px;left:14px;width:calc(100% - 28px);height:8px;background:#1c202c;border-radius:4px;overflow:hidden;z-index:20;}
#diff-bar{height:100%;width:0%;background:linear-gradient(90deg,#2ed573,#ff4757);}
#crit-zone-indicator{position:absolute;pointer-events:none;border:2px dashed rgba(255,210,0,.4);border-radius:50%;display:none;z-index:15;}
#custom-cursor{position:fixed;top:0;left:0;width:32px;height:32px;margin-left:-16px;margin-top:-16px;pointer-events:none;z-index:50;}
</style>
</head>
<body>
<div id="game-container">

  </div>
  <div id="start-overlay" class="overlay">

</div>

<div id="shop-panel">

  </div>
  <div id="upgrades-container"></div>
  <div style="text-align:center;font-size:.7rem;color:#57606f;border-top:1px solid #232b3e;padding:6px;">v3.0</div>
</div>

<div id="custom-cursor">

  </svg>
</div>

let enemies=[], particles=[], damageTexts=[], goldCoins=[], lightningChains=[], projectiles=[], grenades=[], drones=[];
let firelines=[], critZoneRadius=0;

// ── GRID ESPACIAL ────────────────────────────────────────────────────────────
// Con hordas de cientos/miles de enemigos, las búsquedas "enemigos cerca de X" dejan de ser
// viables en O(n) repetido muchas veces por frame. Esta cuadrícula divide el mapa en celdas
// y se reconstruye una vez por frame; las consultas solo recorren las celdas relevantes.
const GRID_CELL=70;
let enemyGrid=new Map();
function gridKey(cx,cy){return cx+','+cy;}
function buildEnemyGrid(){
  enemyGrid=new Map();
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];
    if(e.hp<=0) continue;
    const gx=Math.floor(e.x/GRID_CELL), gy=Math.floor(e.y/GRID_CELL);
    const k=gridKey(gx,gy);
    let bucket=enemyGrid.get(k);
    if(!bucket){bucket=[];enemyGrid.set(k,bucket);}
    bucket.push(e);
  }
}
// Devuelve enemigos vivos cuyo centro está dentro de `radius` de (x,y), consultando solo
// las celdas que intersectan ese círculo en vez de recorrer el array completo.
function getNearbyEnemies(x,y,radius){
  const result=[];
  const minGx=Math.floor((x-radius)/GRID_CELL), maxGx=Math.floor((x+radius)/GRID_CELL);
  const minGy=Math.floor((y-radius)/GRID_CELL), maxGy=Math.floor((y+radius)/GRID_CELL);
  for(let gx=minGx;gx<=maxGx;gx++){
    for(let gy=minGy;gy<=maxGy;gy++){
      const bucket=enemyGrid.get(gridKey(gx,gy));
      if(bucket) for(let i=0;i<bucket.length;i++) result.push(bucket[i]);
    }
  }
  return result;
}

function resizeCanvas(){
  canvas.width=canvas.parentElement.clientWidth;
  canvas.height=canvas.parentElement.clientHeight;
  // shadowCanvas a mitad de resolución: reduce el coste de GPU de compositing de sombras a 1/4
  // sin pérdida visual perceptible (las sombras son formas borrosas sin detalle fino).
  shadowCanvas.width=Math.ceil(canvas.width/2); shadowCanvas.height=Math.ceil(canvas.height/2);
}
window.addEventListener('resize',resizeCanvas); resizeCanvas();

const customCursor=document.getElementById('custom-cursor');
document.addEventListener('mousemove',(e)=>{
  customCursor.style.left=e.clientX+'px';
  customCursor.style.top=e.clientY+'px';
  const r=canvas.getBoundingClientRect();
  G.cursorX=e.clientX-r.left;
  G.cursorY=e.clientY-r.top;
  const cx=canvas.width/2, cy=canvas.height/2;
  G.mouseX=cx+(G.cursorX-cx)/G.cameraZoom;
  G.mouseY=cy+(G.cursorY-cy)/G.cameraZoom;
  const rad=U.coinRadius.v;
  goldCoins.forEach(c=>{
    if(c.phase==='float'){
      const dx=c.x-G.mouseX, dy=c.y-G.mouseY;
      if(Math.sqrt(dx*dx+dy*dy)<rad) c.phase='fly';
    }
  });
});
// Pulso del cursor independiente del estado del juego (menú, tienda, ronda activa)
(function cursorPulseLoop(ts){
  const pulse=0.5+0.5*Math.sin(ts*0.005);
  const ring=document.getElementById('cc-pulse');
  if(ring){ ring.setAttribute('r',8+pulse*3); ring.setAttribute('stroke-opacity',0.3+pulse*0.3); }
  requestAnimationFrame(cursorPulseLoop);
})(0);

class Enemy{
  constructor(type='base',fx=null,fy=null,isBoss=false,isElite=false){
    if(fx!=null&&fy!=null){
      this.x=fx+(Math.random()*40-20); this.y=fy+(Math.random()*40-20);
    }else{
      // Spawn desde todas direcciones para dar sensación de estar rodeado
      const angle=Math.random()*Math.PI*2;
      const cx=canvas.width/2, cy=canvas.height/2;
      const maxR=Math.max(canvas.width,canvas.height)*0.7;
      this.x=cx+Math.cos(angle)*maxR; this.y=cy+Math.sin(angle)*maxR;
    }
    this.type=type; this.isBoss=isBoss; this.isElite=isElite;
    this.burnTimer=0; // tiempo restante quemando
    this.slowTimer=0; // tiempo restante ralentizado por zona crítica
    const lvScale=Math.pow(3.0,gameLevel-1);
    // Variación de tamaño y color por unidad
    const sv=0.75+Math.random()*0.5;  // 0.75x a 1.25x de radio
    const cv=Math.floor(Math.random()*50)-25; // variación de color ±25
    if(isBoss){
      this.radius=62+Math.floor(Math.random()*10); this.speed=0.85; this.color='#c44569';
      this.maxHp=1800*lvScale; this.goldReward=Math.ceil(150*lvScale);
      this.dmgToTower=60; this.attackTimer=0; this.attackRate=1.2;
      this.orbitR=160+Math.random()*40; this.orbitA=Math.random()*Math.PI*2; this.orbitDir=Math.random()<.5?1:-1;
      this.reaching=true; // primero llega a la órbita, luego orbita
    }else if(isElite){
      this.radius=Math.floor(18*sv+4); this.speed=1.0+Math.random()*0.4; this.color=`rgb(${180+cv},${50+cv},${220+cv})`;
      this.maxHp=150*lvScale; this.goldReward=Math.ceil(25*lvScale);
      this.dmgToTower=15;
    }else{
      switch(type){
        case'base':    this.radius=Math.floor(5*sv+2);  this.speed=2.2+Math.random()*.5; this.color=`rgb(${220+cv},${35+cv},35)`;   this.maxHp=8*lvScale;   this.goldReward=Math.ceil(2*Math.pow(1.1,gameLevel-1));  this.dmgToTower=5;  break;
        case'armored': this.radius=Math.floor(10*sv+4); this.speed=0.6+Math.random()*.2; this.color=`rgb(${220+cv},${110+cv},25)`;  this.maxHp=55*lvScale;  this.goldReward=Math.ceil(8*Math.pow(1.1,gameLevel-1));  this.dmgToTower=20; break;
        case'nest':    this.radius=Math.floor(16*sv+4); this.speed=1.2;                   this.color=`rgb(${120+cv},35,${180+cv})`; this.maxHp=100*lvScale; this.goldReward=Math.ceil(20*Math.pow(1.1,gameLevel-1)); this.dmgToTower=30;
          this.orR=Math.min(canvas.width,canvas.height)*.25; this.orA=0; this.orDir=Math.random()<.5?1:-1; this.spawnT=0; this.spawnCD=2.5; break;
        case'bomb':    this.radius=Math.floor(8*sv+3);  this.speed=1.4;                   this.color=`rgb(${200+cv},${180+cv},15)`;  this.maxHp=20*lvScale;  this.goldReward=Math.ceil(5*Math.pow(1.1,gameLevel-1));  this.dmgToTower=8;
          this.srR=Math.sqrt((this.x-canvas.width/2)**2+(this.y-canvas.height/2)**2); this.srA=Math.atan2(this.y-canvas.height/2,this.x-canvas.width/2); break;
        case'electric':this.radius=Math.floor(7*sv+3);  this.speed=1.6;                   this.color=`rgb(0,${180+cv},${210+cv})`;  this.maxHp=16*lvScale;  this.goldReward=Math.ceil(6*Math.pow(1.1,gameLevel-1));  this.dmgToTower=7;  break;
        default:       this.radius=6; this.speed=2; this.color='#ff4757'; this.maxHp=8*lvScale; this.goldReward=2; this.dmgToTower=5;
      }
    }
    this.hp=this.maxHp; this.critMult=1; this.baseSpeed=this.speed;
  }
  update(tx,ty,dt){
    // Slow de zona crítica
    const inCrit=U.critOn.on&&Math.sqrt((this.x-G.mouseX)**2+(this.y-G.mouseY)**2)<U.critRadius.v;
    const slowFactor=inCrit?(1-U.critSlow.v):1;
    this.speed=this.baseSpeed*slowFactor;

    // Quemadura
    if(this.burnTimer>0){
      this.burnTimer-=dt;
      this.hp-=U.firelineDmg.v*dt*0.5; // daño adicional mientras quema
    }

    const dx=tx-this.x, dy=ty-this.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(this.isBoss){
      if(this.reaching){
        // Avanzar hasta alcanzar la distancia de órbita
        if(dist>this.orbitR+5){this.x+=(dx/dist)*this.speed;this.y+=(dy/dist)*this.speed;}
        else{this.reaching=false; this.orbitA=Math.atan2(this.y-ty,this.x-tx);}
      }else{
        // Orbitar permanentemente
        this.orbitA+=dt*(this.speed/this.orbitR)*this.orbitDir;
        this.x=tx+Math.cos(this.orbitA)*this.orbitR;
        this.y=ty+Math.sin(this.orbitA)*this.orbitR;
      }
      this.attackTimer+=dt;
      if(this.attackTimer>=this.attackRate){
        this.attackTimer=0;
        for(let i=0;i<10;i++){
          const a=i*Math.PI/5+(this.orbitA*0.5);
          bossProjectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,alive:true,r:9});
        }
      }
      return dist;
    }
    if(this.isElite){
      if(dist>5){this.x+=(dx/dist)*this.speed;this.y+=(dy/dist)*this.speed;}
      return dist;
    }
    if(this.type==='nest'){
      if(dist>this.orR){this.x+=(dx/dist)*this.speed;this.y+=(dy/dist)*this.speed;this.orA=Math.atan2(this.y-ty,this.x-tx);}
      else{this.orA+=(this.speed/this.orR)*this.orDir;this.x=tx+Math.cos(this.orA)*this.orR;this.y=ty+Math.sin(this.orA)*this.orR;}
      if(G.isRoundActive){this.spawnT+=dt;if(this.spawnT>=this.spawnCD){this.spawnT=0;for(let i=0;i<3;i++)enemies.push(new Enemy('base',this.x,this.y));}}
      return dist;
    }
    if(this.type==='bomb'){
      this.srR-=this.speed; this.srA+=0.02;
      this.x=tx+Math.cos(this.srA)*this.srR; this.y=ty+Math.sin(this.srA)*this.srR;
      return Math.sqrt((tx-this.x)**2+(ty-this.y)**2);
    }
    if(dist>5){this.x+=(dx/dist)*this.speed;this.y+=(dy/dist)*this.speed;}
    return dist;
  }
  draw(){
    // Flash de quemadura
    const burnFlash=this.burnTimer>0&&Math.sin(Date.now()*0.02)>0;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    if(this.isBoss){
      ctx.fillStyle=burnFlash?'#ff9f43':'#c44569'; ctx.shadowColor='#ff6b81'; ctx.shadowBlur=25; ctx.fill(); ctx.shadowBlur=0;
      ctx.strokeStyle='#ff6b81'; ctx.lineWidth=4; ctx.stroke();
      // Anillo exterior del jefe
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius+8,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,107,129,0.3)'; ctx.lineWidth=3; ctx.stroke();
      const bw=this.radius*3;
      ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(this.x-bw/2,this.y-this.radius-16,bw,8);
      ctx.fillStyle='#ff4757'; ctx.fillRect(this.x-bw/2,this.y-this.radius-16,bw*(this.hp/this.maxHp),8);
    }else if(this.isElite){
      ctx.fillStyle=burnFlash?'#ff9f43':this.color; ctx.shadowColor='#e056fd'; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=2; ctx.stroke();
    }else{
      ctx.fillStyle=burnFlash?'#ff7f50':this.color; ctx.fill();
      if(this.type==='nest'){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();}
      else if(this.type==='bomb'){ctx.beginPath();ctx.arc(this.x,this.y,this.radius*.4,0,Math.PI*2);ctx.fillStyle='#1e272e';ctx.fill();}
      else if(this.type==='electric'){ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();}
    }
    if(this.hp<this.maxHp&&!this.isBoss){
      const bw=this.radius*2;
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(this.x-this.radius,this.y-this.radius-6,bw,3);
      ctx.fillStyle='#2ed573'; ctx.fillRect(this.x-this.radius,this.y-this.radius-6,bw*(this.hp/this.maxHp),3);
    }
    // Indicador de quemadura
    if(this.burnTimer>0){
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius+3,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,140,0,${Math.min(0.8,this.burnTimer/2)})`; ctx.lineWidth=2; ctx.stroke();
    }
  }
}

class Projectile{
  constructor(x,y,vx,vy,dmg,r=4,color='#00d2d3',pierce=0,bounces=0,ox=0,oy=0){
    this.x=x+ox; this.y=y+oy; this.vx=vx; this.vy=vy;
    this.damage=dmg; this.radius=r; this.color=color;
    this.pierceLeft=pierce; this.bouncesLeft=bounces;
    this.hitEnemies=new Set(); this.alive=true; this.isSniper=false;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<-150||this.x>canvas.width+150||this.y<-150||this.y>canvas.height+150) this.alive=false;
  }
  bounce(enemy){
    // Buscar el siguiente enemigo más cercano no golpeado
    let next=null, nDist=Infinity;
    enemies.forEach(e=>{if(!this.hitEnemies.has(e)&&e.hp>0&&e!==enemy){const d=Math.sqrt((e.x-this.x)**2+(e.y-this.y)**2);if(d<nDist){nDist=d;next=e;}}});
    if(next){const dx=next.x-this.x, dy=next.y-this.y, d=Math.sqrt(dx*dx+dy*dy);const sp=Math.sqrt(this.vx**2+this.vy**2);this.vx=(dx/d)*sp;this.vy=(dy/d)*sp;}
    else{this.alive=false;}
  }
  draw(){
    ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.shadowColor=this.color; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
    if(this.isSniper){ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();}
  }
}

class Grenade{
  constructor(tx,ty,dmg,radius,maxRange){
    const cx=canvas.width/2, cy=canvas.height/2;
    const dx=tx-cx, dy=ty-cy, dist=Math.sqrt(dx*dx+dy*dy);
    const capped=Math.min(dist,maxRange);
    const angle=Math.atan2(dy,dx);
    this.targetX=cx+Math.cos(angle)*capped; this.targetY=cy+Math.sin(angle)*capped;
    this.x=cx; this.y=cy;
    this.dmg=dmg; this.radius=radius;
    this.travel=0; this.travelDur=0.7; this.fuseTimer=0.5;
    this.flying=true; this.alive=true;
    this.bounceY=0; this.arcT=0;
  }
  update(dt){
    if(this.flying){
      this.travel+=dt/this.travelDur;
      if(this.travel>=1){this.travel=1;this.flying=false;}
      const t=this.travel;
      this.x=lerp(canvas.width/2,this.targetX,t);
      this.y=lerp(canvas.height/2,this.targetY,t)-Math.sin(t*Math.PI)*60;
    }else{
      this.fuseTimer-=dt;
      if(this.fuseTimer<=0) this.explode();
    }
  }
  explode(){
    this.alive=false;
    for(let i=0;i<22;i++) particles.push(new Particle(this.x,this.y,'#ff9f43',1.7));
    G.screenShake=Math.max(G.screenShake,9);
    const nearby=getNearbyEnemies(this.x,this.y,this.radius);
    for(let i=0;i<nearby.length;i++){
      const e=nearby[i];
      if(e.hp>0){
        const d=Math.sqrt((e.x-this.x)**2+(e.y-this.y)**2);
        if(d<=this.radius){
          const dmg=this.dmg*(1-d/this.radius*.5);
          dealDamage(e,dmg,'💥');
        }
      }
    }
  }
  draw(){
    ctx.save();
    ctx.beginPath(); ctx.arc(this.x,this.y,7,0,Math.PI*2);
    ctx.fillStyle='#ff9f43'; ctx.shadowColor='#ff9f43'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    if(!this.flying){
      const frac=1-this.fuseTimer/.5;
      ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,71,87,${frac})`; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();
  }
}

class Drone{
  constructor(index){
    // Posición inicial aleatoria en pantalla
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
    this.attackTimer=0;
    this.wanderTimer=0;
    this.wanderInterval=1.5+Math.random()*2;
    this.index=index;
  }
  update(dt){
    const spd=U.droneSpeed.v/60;
    // Wander: cambiar dirección periódicamente o si hay un objetivo cerca
    this.wanderTimer+=dt;
    let chaseTarget=null;
    let bd=U.droneRange.v;
    let nearby=getNearbyEnemies(this.x,this.y,bd);
    for(let i=0;i<nearby.length;i++){const e=nearby[i];if(e.hp>0){const d=Math.sqrt((e.x-this.x)**2+(e.y-this.y)**2);if(d<bd){bd=d;chaseTarget=e;}}}

    if(chaseTarget){
      // Moverse hacia el objetivo
      const dx=chaseTarget.x-this.x, dy=chaseTarget.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx=dx/d; this.vy=dy/d;
    }else if(this.wanderTimer>=this.wanderInterval){
      // Nueva dirección aleatoria
      this.wanderTimer=0;
      this.wanderInterval=1.5+Math.random()*2;
      const a=Math.random()*Math.PI*2;
      this.vx=Math.cos(a); this.vy=Math.sin(a);
    }

    this.x+=this.vx*spd; this.y+=this.vy*spd;
    // Rebotar en bordes
    if(this.x<20){this.x=20;this.vx=Math.abs(this.vx);}
    if(this.x>canvas.width-20){this.x=canvas.width-20;this.vx=-Math.abs(this.vx);}
    if(this.y<20){this.y=20;this.vy=Math.abs(this.vy);}
    if(this.y>canvas.height-20){this.y=canvas.height-20;this.vy=-Math.abs(this.vy);}

    // Atacar
    this.attackTimer+=dt;
    const rate=1/U.droneRate.v;
    if(this.attackTimer>=rate){
      this.attackTimer=0;
      let best=null, bbd=U.droneRange.v;
      const atkNearby=getNearbyEnemies(this.x,this.y,bbd);
      for(let i=0;i<atkNearby.length;i++){const e=atkNearby[i];if(e.hp>0){const d=Math.sqrt((e.x-this.x)**2+(e.y-this.y)**2);if(d<bbd){bbd=d;best=e;}}}
      if(best){
        dealDamage(best,U.droneDmg.v,'🤖');
        lightningChains.push({x1:this.x,y1:this.y,x2:best.x,y2:best.y,alpha:1,color:'#74b9ff'});
      }
    }
  }
  draw(){
    ctx.save();
    // Cuerpo del drone
    ctx.beginPath(); ctx.arc(this.x,this.y,9,0,Math.PI*2);
    ctx.fillStyle='#74b9ff'; ctx.shadowColor='#74b9ff'; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(this.x,this.y,4,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    // Indicador de dirección
    const angle=Math.atan2(this.vy,this.vx);
    ctx.beginPath(); ctx.moveTo(this.x+Math.cos(angle)*9,this.y+Math.sin(angle)*9);
    ctx.lineTo(this.x+Math.cos(angle)*15,this.y+Math.sin(angle)*15);
    ctx.strokeStyle='rgba(116,185,255,0.6)'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  }
}

class GoldCoin{
  constructor(sx,sy,tx,ty,val){
    this.x=sx; this.y=sy; this.baseX=sx; this.baseY=sy;
    this.tx=tx; this.ty=ty; this.value=val;
    this.alive=true; this.phase='float';
    this.floatT=0; this.flyP=0; this.flyDur=0.32;
    this.bob=Math.random()*Math.PI*2;
  }
  update(dt){
    if(this.phase==='float'){
      this.floatT+=dt;
      this.y=this.baseY+Math.sin(this.floatT*3+this.bob)*5;
      // Auto-recoger tras 6s flotando para evitar acumulación ilimitada con hordas masivas
      if(this.floatT>6) this.phase='fly';
    }else{
      this.floatT+=dt; this.flyP+=dt/this.flyDur;
      if(this.flyP>=1){this.flyP=1;this.alive=false;collectCoin(this.value);}
      const t=this.flyP*this.flyP;
      this.x=this.baseX+(this.tx-this.baseX)*t;
      this.y=(this.baseY+Math.sin(this.floatT*3+this.bob)*5)*(1-t)+this.ty*t;
    }
  }
  draw(){
    const s=this.phase==='fly'?Math.max(.35,1-this.flyP*.65):1;
    const a=this.phase==='fly'?Math.max(.2,1-this.flyP*.6):1;
    ctx.save(); ctx.globalAlpha=a;
    ctx.shadowColor='#ffec6e'; ctx.shadowBlur=this.phase==='float'?10+Math.sin(this.floatT*4)*4:6;
    ctx.beginPath(); ctx.arc(this.x,this.y,5*s,0,Math.PI*2);
    ctx.fillStyle='#ffd700'; ctx.fill(); ctx.restore();
  }
}

const MAX_PARTICLES=600;
const MAX_DAMAGE_TEXTS=80;
const MAX_GOLDCOINS=400;

class Particle{
  constructor(x,y,color,sm=1){
    this.x=x; this.y=y;
    const a=Math.random()*Math.PI*2, sp=(Math.random()*4+2)*sm;
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp;
    this.r=(Math.random()*3+1)*sm; this.alpha=1; this.decay=Math.random()*.06+.04; this.color=color;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay;}
  draw(){ctx.save();ctx.globalAlpha=this.alpha;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.color;ctx.fill();ctx.restore();}
}

class DamageText{
  constructor(x,y,text,color='#ffffff'){
    this.x=x+(Math.random()*20-10); this.y=y-10; this.text=text; this.alpha=1; this.vy=-1.5; this.color=color;
  }
  update(){this.y+=this.vy;this.vy*=.96;this.alpha-=.03;}
  draw(){ctx.save();ctx.globalAlpha=this.alpha;ctx.font="bold 13px 'Courier New'";ctx.fillStyle=this.color;ctx.fillText(this.text,this.x,this.y);ctx.restore();}
}

let bossProjectiles=[];

// ── HELPERS ──────────────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}

function collectCoin(val){
  G.gold+=val; G.goldThisRound+=val; updateHUD();
}

function dealDamage(enemy,dmg,icon=''){
  // Crítico si en zona crítica
  let finalDmg=dmg;
  if(U.critOn.on){
    const dx=enemy.x-G.mouseX, dy=enemy.y-G.mouseY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<U.critRadius.v&&Math.random()<U.critChance.v){
      finalDmg*=2.5;
      damageTexts.push(new DamageText(enemy.x,enemy.y,`💥${Math.floor(finalDmg)}!`,'#ffd700'));
    }else{
      if(icon) damageTexts.push(new DamageText(enemy.x,enemy.y,icon+Math.floor(finalDmg)));
    }
  }else{
    if(icon) damageTexts.push(new DamageText(enemy.x,enemy.y,icon+Math.floor(finalDmg)));
  }
  enemy.hp-=finalDmg;
  G.totalDamageDealt+=finalDmg;
  checkDeath(enemy);
}

function checkDeath(enemy){
  if(enemy.hp>0) return;
  const cx=canvas.width/2, cy=canvas.height/2;
  goldCoins.push(new GoldCoin(enemy.x,enemy.y,cx,cy,enemy.goldReward));
  for(let i=0;i<4;i++) particles.push(new Particle(enemy.x,enemy.y,enemy.color,0.8));
  if(enemy.isBoss){
    G.screenShake=18;
    for(let i=0;i<40;i++) particles.push(new Particle(enemy.x,enemy.y,'#ffd700',2));
    bossEnemy=null;
    document.getElementById('boss-bar-wrap').style.display='none';
    finishRound(true);
    return;
  }
  if(enemy.isElite){
    if(Math.random()<U.eliteVacuum.v){
      goldCoins.forEach(c=>{if(c.phase==='float') c.phase='fly';});
      damageTexts.push(new DamageText(enemy.x,enemy.y,'⭐ VACÍO!','#ffd700'));
    }
  }
  // Explosión de fuego si muere quemado y la mejora está activa
  if(enemy.burnTimer>0&&U.firelineChain&&U.firelineChain.v>0){
    const fireR=80;
    for(let i=0;i<15;i++) particles.push(new Particle(enemy.x,enemy.y,'#ff7043',1.5));
    const nearby=getNearbyEnemies(enemy.x,enemy.y,fireR);
    for(let i=0;i<nearby.length;i++){
      const e=nearby[i];
      if(e.hp>0){
        const d=Math.sqrt((e.x-enemy.x)**2+(e.y-enemy.y)**2);
        if(d<=fireR){dealDamage(e,U.firelineDmg.v*2,'🔥');e.burnTimer=Math.max(e.burnTimer,U.firelineBurn.v);}
      }
    }
  }
  if(enemy.type==='bomb') triggerBomb(enemy.x,enemy.y);
  else if(enemy.type==='electric') triggerLightning(enemy.x,enemy.y);
}

function triggerBomb(ox,oy){
  const r=U.unlockBomb.on?(U.bombRadius.v||110):110;
  const dmg=U.baseDmg.v*2.5*(U.bombDmg?U.bombDmg.v:1);
  for(let i=0;i<25;i++) particles.push(new Particle(ox,oy,'#ff9f43',1.8));
  G.screenShake=Math.max(G.screenShake,8);
  const nearby=getNearbyEnemies(ox,oy,r);
  for(let i=0;i<nearby.length;i++){const e=nearby[i];if(e.hp>0){const d=Math.sqrt((e.x-ox)**2+(e.y-oy)**2);if(d<=r) dealDamage(e,dmg,'💥');}}
}

function triggerLightning(ox,oy){
  const maxR=U.unlockElectric.on?(U.elecRange?U.elecRange.v:130):130;
  const chains=U.unlockElectric.on?(U.elecChain?U.elecChain.v:5):5;
  const dmgMult=U.unlockElectric.on?(U.elecDmg?U.elecDmg.v:1.2):1.2;
  const dmg=U.baseDmg.v*dmgMult;
  let cx=ox, cy=oy, ch=chains;
  const hit=new Set();
  while(ch-->0){
    const candidates=getNearbyEnemies(cx,cy,maxR);
    let best=null, bd=maxR;
    for(let i=0;i<candidates.length;i++){const e=candidates[i];if(e.hp>0&&!hit.has(e)){const d=Math.sqrt((e.x-cx)**2+(e.y-cy)**2);if(d<bd){bd=d;best=e;}}}
    if(best){dealDamage(best,dmg,'⚡');lightningChains.push({x1:cx,y1:cy,x2:best.x,y2:best.y,alpha:1,color:'#00d2d3'});cx=best.x;cy=best.y;hit.add(best);}
    else break;
  }
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
const MAX_ENEMIES_ALIVE=1500; // tope de seguridad: ya es una "mancha" total en pantalla
function spawnSquad(){
  if(enemies.length>=MAX_ENEMIES_ALIVE) return;
  // Spawn siempre (incluso si !G.isRoundActive para el inicio inmediato)
  // Escala exponencial agresiva: el tamaño de horda crece sin techo con el tiempo vivido,
  // hasta llenar la pantalla de enemigos (estilo "horda" tipo survivors).
  const t=G.difficultyTime;
  const expScale=Math.pow(2, t/12);            // duplica cada 12s (antes 15s)
  const lvScale=Math.pow(1.6, gameLevel-1);    // escala adicional por nivel
  const base=4+Math.random()*3;
  let size=Math.max(1,Math.floor(base*expScale*lvScale));
  size=Math.min(size,MAX_ENEMIES_ALIVE-enemies.length);

  const cx=canvas.width/2, cy=canvas.height/2;
  const spawnR=Math.max(canvas.width,canvas.height)*0.65;
  // Sector de aparición: un arco amplio centrado en un ángulo aleatorio, para que se note
  // como "oleada" viniendo de una zona pero sin amontonarse en un único punto de 40px.
  const sectorCenter=Math.random()*Math.PI*2;
  const sectorWidth=Math.PI*0.7+Math.min(Math.PI*1.3,t*0.01); // el arco se ensancha con el tiempo

  for(let i=0;i<size;i++){
    const a=sectorCenter+(Math.random()-0.5)*sectorWidth;
    const r=spawnR*(0.9+Math.random()*0.2);
    const sx=cx+Math.cos(a)*r, sy=cy+Math.sin(a)*r;
    const rr=Math.random();
    let type='base';
    const isElite=(rr<0.04+t*0.003)&&gameLevel>=2;
    if(!isElite){
      if(rr<0.06&&t>20) type='nest';
      else if(rr<0.22&&t>5) type='armored';
      else if(rr<0.22+(U.unlockBomb.on?U.bombRate.v:0)&&U.unlockBomb.on) type='bomb';
      else if(rr<0.22+(U.unlockBomb.on?U.bombRate.v:0)+(U.unlockElectric.on?U.elecRate.v:0)&&U.unlockElectric.on) type='electric';
    }
    enemies.push(new Enemy(type,sx,sy,false,isElite));
  }
  G.enemiesAlive=enemies.length; updateHUD();
}

function spawnBoss(){
  if(bossSpawned) return;
  bossSpawned=true;
  const cx=canvas.width/2, cy=canvas.height/2;
  // Spawn desde un borde aleatorio
  const side=Math.floor(Math.random()*4);
  let bx,by;
  if(side===0){bx=cx;by=-60;} else if(side===1){bx=canvas.width+60;by=cy;} else if(side===2){bx=cx;by=canvas.height+60;} else{bx=-60;by=cy;}
  bossEnemy=new Enemy('base',bx,by,true,false);
  bossEnemy.x=bx; bossEnemy.y=by;
  enemies.push(bossEnemy);
  document.getElementById('boss-bar-wrap').style.display='block';
  damageTexts.push(new DamageText(cx,cy-60,'⚠ JEFE DE NIVEL ⚠','#ff4757'));
  G.screenShake=12;
}

function getAim(){
  const cx=canvas.width/2, cy=canvas.height/2;
  let best=null, bd=70;
  const nearby=getNearbyEnemies(G.mouseX,G.mouseY,bd);
  for(let i=0;i<nearby.length;i++){const e=nearby[i];if(e.hp>0){const d=Math.sqrt((e.x-G.mouseX)**2+(e.y-G.mouseY)**2);if(d<bd){bd=d;best=e;}}}
  return best?{x:best.x,y:best.y}:{x:G.mouseX,y:G.mouseY};
}

function fireBase(){
  const cx=canvas.width/2, cy=canvas.height/2;
  const aim=getAim();
  const angle=Math.atan2(aim.y-cy,aim.x-cx);
  const spd=10, vx=Math.cos(angle)*spd, vy=Math.sin(angle)*spd;
  const cnt=U.baseCount.v;
  const perpX=-Math.sin(angle), perpY=Math.cos(angle);
  for(let i=0;i<cnt;i++){
    const off=i-(cnt-1)/2;
    const p=new Projectile(cx,cy,vx,vy,U.baseDmg.v,U.baseSize.v,'#00d2d3',0,U.unlockBounce.on?U.baseBounce.v:0,perpX*off*12,perpY*off*12);
    projectiles.push(p);
  }
}

function fireShotgun(){
  const cx=canvas.width/2, cy=canvas.height/2;
  const aim=getAim();
  const baseAngle=Math.atan2(aim.y-cy,aim.x-cx);
  const spread=0.45, cnt=U.sgCount.v;
  const pellets=[];
  for(let i=0;i<cnt;i++){
    const a=baseAngle-spread/2+spread/(cnt-1||1)*i+(Math.random()*.12-.06);
    const spd=11;
    pellets.push(new Projectile(cx,cy,Math.cos(a)*spd,Math.sin(a)*spd,U.sgDmg.v,4,'#fd79a8'));
    pellets[pellets.length-1].isPellet=true;
    projectiles.push(pellets[pellets.length-1]);
  }
  // El arco voltaico ahora es un efecto continuo gestionado por tickVoltArc() en el loop principal,
  // que conecta perdigones cercanos entre sí mientras viajan y daña a los enemigos que atraviesan el arco.
}

// ── ARCO VOLTAICO (efecto continuo entre perdigones de escopeta) ──────────────
function tickVoltArc(dt){
  if(!U.unlockVoltArc.on) return;
  const pellets=projectiles.filter(p=>p.isPellet&&p.alive);
  if(pellets.length<2) return;
  const range=U.voltArcRange.v;
  const dps=U.voltArcDmg.v;
  for(let i=0;i<pellets.length;i++){
    for(let j=i+1;j<pellets.length;j++){
      const p1=pellets[i], p2=pellets[j];
      const dx=p2.x-p1.x, dy=p2.y-p1.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<=range){
        // Dibujar el arco (con un ligero desvío aleatorio para efecto eléctrico)
        ctx.save(); ctx.beginPath(); ctx.moveTo(p1.x,p1.y);
        ctx.lineTo((p1.x+p2.x)/2+(Math.random()*8-4),(p1.y+p2.y)/2+(Math.random()*8-4));
        ctx.lineTo(p2.x,p2.y);
        ctx.strokeStyle='rgba(253,121,168,0.8)'; ctx.lineWidth=2;
        ctx.shadowColor='#fd79a8'; ctx.shadowBlur=8; ctx.stroke(); ctx.restore();
        // Dañar a los enemigos que el segmento atraviesa (solo los cercanos al punto medio)
        const midX=(p1.x+p2.x)/2, midY=(p1.y+p2.y)/2;
        const nearby=getNearbyEnemies(midX,midY,d/2+30);
        for(let k=0;k<nearby.length;k++){
          const e=nearby[k];
          if(e.hp>0&&pointOnLine(e.x,e.y,p1.x,p1.y,p2.x,p2.y,e.radius+3)){
            dealDamage(e,dps*dt,'');
          }
        }
      }
    }
  }
}

function tickAura(dt){
  if(!U.auraOn.on) return;
  G.auraTimer+=dt;
  const freq=1/U.auraFreq.v;
  const cx=canvas.width/2, cy=canvas.height/2;
  // Draw aura
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,U.auraRadius.v,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,210,211,${.15+Math.sin(G.auraTimer*6)*.08})`; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=`rgba(0,210,211,0.03)`; ctx.fill();
  ctx.restore();
  if(G.auraTimer>=freq){
    G.auraTimer=0;
    const nearby=getNearbyEnemies(cx,cy,U.auraRadius.v);
    for(let i=0;i<nearby.length;i++){
      const e=nearby[i];
      if(e.hp>0){
        const d=Math.sqrt((e.x-cx)**2+(e.y-cy)**2);
        if(d<=U.auraRadius.v) dealDamage(e,U.auraDmg.v*freq,'');

let activeDrones=[];
function tickDrones(dt,cx,cy){
  if(!U.droneOn.on) return;
  const needed=U.droneCount.v;
  while(activeDrones.length<needed) activeDrones.push(new Drone(activeDrones.length));
  while(activeDrones.length>needed) activeDrones.pop();
  activeDrones.forEach(d=>{d.update(dt);d.draw();});
}

let activeFireline=null;
let firelineAnimTimer=0;
function tickFireline(dt){
  if(!U.firelineOn.on) return;
  G.firelineTimer+=dt;
  const freq=1/U.firelineFreq.v;
  const cx=canvas.width/2, cy=canvas.height/2;
  if(activeFireline&&activeFireline.alpha>0){
    activeFireline.alpha-=dt*3;
    const fl=activeFireline;
    ctx.save();
    ctx.beginPath(); ctx.moveTo(fl.x1,fl.y1); ctx.lineTo(fl.x2,fl.y2);
    ctx.strokeStyle=`rgba(255,107,107,${fl.alpha})`; ctx.lineWidth=U.firelineWidth.v;
    ctx.shadowColor='#ff6b6b'; ctx.shadowBlur=12; ctx.stroke(); ctx.restore();
    const lineLen=Math.sqrt((fl.x2-fl.x1)**2+(fl.y2-fl.y1)**2);
    const steps=Math.max(1,Math.ceil(lineLen/150));
    const tol=U.firelineWidth.v/2+20;
    const seen=new Set();
    for(let s=0;s<=steps;s++){
      const t=s/steps;
      const sx=fl.x1+(fl.x2-fl.x1)*t, sy=fl.y1+(fl.y2-fl.y1)*t;
      const nearby=getNearbyEnemies(sx,sy,tol+80);
      for(let i=0;i<nearby.length;i++){
        const e=nearby[i];
        if(seen.has(e)) continue;
        seen.add(e);
        if(e.hp>0&&pointOnLine(e.x,e.y,fl.x1,fl.y1,fl.x2,fl.y2,U.firelineWidth.v/2+e.radius)){
          dealDamage(e,U.firelineDmg.v*dt,'🔥');
          e.burnTimer=Math.max(e.burnTimer, U.firelineBurn.v); // aplicar quemadura
        }
      }
    }
  }
  if(G.firelineTimer>=freq){
    G.firelineTimer=0;
    const angle=Math.random()*Math.PI*2;
    const len=Math.max(canvas.width,canvas.height);
    activeFireline={x1:cx,y1:cy,x2:cx+Math.cos(angle)*len,y2:cy+Math.sin(angle)*len,alpha:1};
  }
}

function pointOnLine(px,py,x1,y1,x2,y2,tol){
  const dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
  if(len2===0) return false;
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));
  const nx=x1+t*dx, ny=y1+t*dy;
  return Math.sqrt((px-nx)**2+(py-ny)**2)<=tol;
}

function drawCritZone(){
  if(!U.critOn.on) return;
  const r=U.critRadius.v;
  ctx.save();
  ctx.beginPath(); ctx.arc(G.mouseX,G.mouseY,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(253,203,110,.35)'; ctx.lineWidth=2; ctx.setLineDash([6,4]);

  ctx.font='bold 10px Courier New'; ctx.fillStyle='rgba(253,203,110,0.5)';
  ctx.textAlign='center'; ctx.textBaseline='middle';

}

function tickTractor(dt){

      if(best){
        best.phase='fly';
        lightningChains.push({x1:canvas.width/2,y1:canvas.height/2,x2:best.x,y2:best.y,alpha:0.8,color:'#ffd700'});
      }
    }
  }
}

// ── MISIL TELEDIRIGIDO ────────────────────────────────────────────────────────
let missiles=[];
class Missile{
  constructor(tx,ty){
    const cx=canvas.width/2, cy=canvas.height/2;
    this.x=cx; this.y=cy;
    this.vx=0; this.vy=-1;
    this.target=tx; // enemy object
    this.alive=true;
    this.trail=[];
  }
  update(dt){
    if(this.target&&this.target.hp>0){
      const dx=this.target.x-this.x, dy=this.target.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<10){this.explode();return;}
      const ax=dx/d*5, ay=dy/d*5;
      this.vx=this.vx*.82+ax*.18; this.vy=this.vy*.82+ay*.18;
      const sp=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
      if(sp>5){this.vx=this.vx/sp*5;this.vy=this.vy/sp*5;}
    }
    this.x+=this.vx; this.y+=this.vy;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14) this.trail.shift();
    if(this.x<-120||this.x>canvas.width+120||this.y<-120||this.y>canvas.height+120) this.alive=false;
  }
  explode(){
    this.alive=false;
    for(let i=0;i<22;i++) particles.push(new Particle(this.x,this.y,'#ff9f43',1.8));
    G.screenShake=Math.max(G.screenShake,7);
    enemies.forEach(e=>{
      if(e.hp>0){const d=Math.sqrt((e.x-this.x)**2+(e.y-this.y)**2);if(d<=U.missileRadius.v) dealDamage(e,U.missileDmg.v*(1-d/U.missileRadius.v*.5),'💥');}
    });
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      ctx.beginPath(); ctx.arc(this.trail[i].x,this.trail[i].y,3*(i/this.trail.length),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,159,67,${0.5*i/this.trail.length})`; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(this.x,this.y,6,0,Math.PI*2);
    ctx.fillStyle='#ff9f43'; ctx.shadowColor='#ff9f43'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
  }
}

let missileTimer=0;
function tickMissile(dt){
  if(!U.unlockMissile.on) return;
  missileTimer+=dt;
  const rate=1/U.missileRate.v;
  if(missileTimer>=rate){
    missileTimer=0;
    let best=null, bh=-1;
    enemies.forEach(e=>{if(e.hp>0&&e.hp>bh){bh=e.hp;best=e;}});
    if(best) missiles.push(new Missile(best));
  }
  missiles.forEach(m=>{m.update(dt);m.draw();});
  missiles=missiles.filter(m=>m.alive);
}

// ── RAYO LÁSER ───────────────────────────────────────────────────────────────
function tickLaser(dt){
  if(!U.unlockLaser.on) return;
  const cx=canvas.width/2, cy=canvas.height/2;
  const range=U.laserRange.v;
  const candidates=getNearbyEnemies(cx,cy,range);
  const sorted=candidates.filter(e=>e.hp>0)
    .map(e=>({e,d:Math.sqrt((e.x-cx)**2+(e.y-cy)**2)}))
    .filter(o=>o.d<=range).sort((a,b)=>a.d-b.d).slice(0,U.laserChain.v);
  sorted.forEach((o,i)=>{
    const e=o.e;
    dealDamage(e,U.laserDps.v*dt,'');
    const px=i===0?cx:sorted[i-1].e.x, py=i===0?cy:sorted[i-1].e.y;
    ctx.save(); ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(e.x,e.y);
    ctx.strokeStyle=`rgba(255,50,50,0.85)`; ctx.lineWidth=3-i*.5;
    ctx.shadowColor='#ff3232'; ctx.shadowBlur=15; ctx.stroke(); ctx.restore();
  });
}

// ── ESFERAS ÓRBITA ────────────────────────────────────────────────────────────
let orbitAngle=0;
function tickOrbit(dt){
  if(!U.unlockOrbit.on) return;
  const cx=canvas.width/2, cy=canvas.height/2;
  orbitAngle+=dt*U.orbitSpeed.v;
  const count=U.orbitCount.v, r=U.orbitRadius.v;
  for(let i=0;i<count;i++){
    const a=orbitAngle+(Math.PI*2/count)*i;
    const ox=cx+Math.cos(a)*r, oy=cy+Math.sin(a)*r;
    const nearby=getNearbyEnemies(ox,oy,40);
    for(let k=0;k<nearby.length;k++){
      const e=nearby[k];
      if(e.hp>0){const d=Math.sqrt((e.x-ox)**2+(e.y-oy)**2);if(d<=e.radius+10) dealDamage(e,U.orbitDmg.v*dt*4,'');}
    }
    ctx.beginPath(); ctx.arc(ox,oy,10,0,Math.PI*2);
    ctx.fillStyle='#5f27cd'; ctx.shadowColor='#a29bfe'; ctx.shadowBlur=18; ctx.fill(); ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ox,oy);
    ctx.strokeStyle='rgba(162,155,254,0.15)'; ctx.lineWidth=1; ctx.stroke();
  }
}

// ── SOMBRAS ──────────────────────────────────────────────────────────────────
const MAX_SHADOWS=180; // tope de sombras dibujadas por frame para sostener hordas masivas
function drawShadowLayer(cx,cy){
  const W=shadowCanvas.width, H=shadowCanvas.height;
  const scale=0.5; // shadowCanvas está a mitad de resolución del canvas principal
  shadowCtx.clearRect(0,0,W,H);
  const op=Math.max(0.05,U.shadowOp.v);
  // El maxDim en espacio de shadowCanvas (ya escalado a la mitad)
  const maxDim=Math.sqrt(canvas.width**2+canvas.height**2)*1.6*scale;
  shadowCtx.save();
  // Replicar la transformación de cámara escalada a mitad
  shadowCtx.translate(cx*scale,cy*scale); shadowCtx.scale(G.cameraZoom,G.cameraZoom); shadowCtx.translate(-cx*scale,-cy*scale);
  shadowCtx.globalCompositeOperation='source-over';
  shadowCtx.globalAlpha=op;
  const dynamicMax=enemies.length>800?60:enemies.length>300?100:MAX_SHADOWS;
  const shadowSet=enemies; // sombra para todos los enemigos sin límite
  shadowCtx.fillStyle='rgba(5,7,12,1)';
  shadowCtx.beginPath();
  for(let i=0;i<shadowSet.length;i++){
    const e=shadowSet[i];
    const ex=e.x*scale, ey=e.y*scale;
    const angle=Math.atan2(ey-cy*scale, ex-cx*scale);
    const w=e.radius*1.2*scale;
    const cos=Math.cos(angle), sin=Math.sin(angle);
    const cosP=Math.cos(angle+Math.PI/2), sinP=Math.sin(angle+Math.PI/2);
    shadowCtx.moveTo(ex+cosP*w,ey+sinP*w);
    shadowCtx.lineTo(ex-cosP*w,ey-sinP*w);
    shadowCtx.lineTo(ex-cosP*w+cos*maxDim,ey-sinP*w+sin*maxDim);
    shadowCtx.lineTo(ex+cosP*w+cos*maxDim,ey+sinP*w+sin*maxDim);
    shadowCtx.closePath();
  }
  shadowCtx.fill();
  shadowCtx.globalCompositeOperation='destination-out';
  shadowCtx.globalAlpha=1;
  projectiles.forEach(p=>{
    const px=p.x*scale, py=p.y*scale, pr=55*scale;
    const g=shadowCtx.createRadialGradient(px,py,0,px,py,pr);
    g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(.5,'rgba(0,0,0,.7)'); g.addColorStop(1,'rgba(0,0,0,0)');
    shadowCtx.fillStyle=g; shadowCtx.beginPath(); shadowCtx.arc(px,py,pr,0,Math.PI*2); shadowCtx.fill();
  });
  goldCoins.forEach(c=>{
    const cx2=c.x*scale, cy2=c.y*scale, cr=40*scale;
    const g=shadowCtx.createRadialGradient(cx2,cy2,0,cx2,cy2,cr);
    g.addColorStop(0,'rgba(0,0,0,.9)'); g.addColorStop(1,'rgba(0,0,0,0)');
    shadowCtx.fillStyle=g; shadowCtx.beginPath(); shadowCtx.arc(cx2,cy2,cr,0,Math.PI*2); shadowCtx.fill();
  });
  shadowCtx.restore();
  // Escalar el shadowCanvas de vuelta al tamaño completo al componer sobre el ctx principal
  ctx.save(); ctx.globalCompositeOperation='multiply';
  ctx.drawImage(shadowCanvas,0,0,canvas.width,canvas.height); ctx.restore();
}

function updateHUD(){
  document.getElementById('gold-hud').innerText=`🪙 ${G.gold}`;
  document.getElementById('timer-hud').innerText=formatTime(G.roundTimer);
  document.getElementById('hp-hud').innerText=`❤ ${Math.max(0,Math.ceil(G.towerHealth))}`;
  document.getElementById('enemies-hud').innerText=`👾 ${G.enemiesAlive}`;
  document.getElementById('level-hud').innerText=`Nivel ${gameLevel}`;
  document.getElementById('shop-gold').innerText=`🪙 ${G.gold}`;
  document.getElementById('shop-level-badge').innerText=`NIVEL ${gameLevel} — Dificultad ${getDiffLabel()}`;
  const td=document.getElementById('timer-hud');
  if(G.isRoundActive) td.classList.add('timer-active'); else td.classList.remove('timer-active');
  if(bossEnemy&&bossEnemy.hp>0){
    document.getElementById('boss-bar').style.width=`${(bossEnemy.hp/bossEnemy.maxHp)*100}%`;
  }
}
function getDiffLabel(){const labels=['Base','Dura','Brutal','Caótica','Apocalíptica'];return labels[Math.min(gameLevel-1,labels.length-1)];}
function formatTime(s){const m=Math.floor(s/60);return`${m.toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

let currentTab='active';
// Mapa de isWeapon -> clave real del upgrade que lo desbloquea (no todas siguen el patrón 'unlock'+Nombre)
const WEAPON_UNLOCK_KEY={
  Aura:'auraOn', Drone:'droneOn', Fireline:'firelineOn', Crit:'critOn', Tractor:'tractorOn',
  Bomb:'unlockBomb', Bounce:'unlockBounce', Electric:'unlockElectric', Grenade:'unlockGrenade',
  Laser:'unlockLaser', Missile:'unlockMissile', Orbit:'unlockOrbit', Shotgun:'unlockShotgun', Sniper:'unlockSniper',
  VoltArc:'unlockVoltArc'
};

function renderShop(){
  const c=document.getElementById('upgrades-container');
  c.innerHTML='';
  const keys=Object.keys(U).filter(k=>U[k].tab===currentTab);
  let lastCat='';
  keys.forEach(key=>{
    const up=U[key];
    if(up.cat!==lastCat){
      const h=document.createElement('div'); h.className='section-label'; h.innerText=up.cat; c.appendChild(h);
      lastCat=up.cat;
    }
    // Ocultar sub-armas no desbloqueadas
    if(up.isWeapon){
      const pk=WEAPON_UNLOCK_KEY[up.isWeapon];
      if(!U[pk]||!U[pk].on) return;
    }
    const isMaxUnlock=up.isUnlock&&up.on;
    const isMaxUpgUnlock=up.isUpgUnlock&&up.lv>1&&up.v>=1; // purchased once is enough
    const isShadowMax=key==='shadowOp'&&up.v<=0.05;
    const btn=document.createElement('button');
    btn.className='upgrade-btn';
    btn.disabled=G.gold<up.cost||isMaxUnlock||isMaxUpgUnlock||isShadowMax;

    let val='';
    if(up.isUnlock||up.isUpgUnlock) val=up.on?'ACTIVO':'🔒';
    else if(key.includes('Rate')||key.includes('rate')||key.includes('Freq')||key.includes('freq')) val=up.v.toFixed(2)+'/s';
    else if(key==='shadowOp') val=Math.round(up.v*100)+'%';
    else if(key==='eliteVacuum') val=Math.round(up.v*100)+'%';
    else if(key==='critChance') val=Math.round(up.v*100)+'%';
    else val=typeof up.v==='number'&&up.v%1!==0?up.v.toFixed(1):up.v;

    btn.innerHTML=`<div class="up-info"><span class="up-name">${up.name}${(!up.isUnlock&&!up.isUpgUnlock)?` (${up.lv})`:''}  <span style="font-size:.6rem;color:#a29bfe">[${val}]</span></span><span class="up-desc">${up.desc}</span></div><span class="up-cost">${isMaxUnlock||isMaxUpgUnlock||isShadowMax?'MAX':`${Math.floor(up.cost)}🪙`}</span>`;
    btn.onclick=()=>buyUpgrade(key);
    c.appendChild(btn);
  });
}

function buyUpgrade(key){
  const up=U[key];
  if(G.gold<up.cost) return;
  G.gold-=up.cost; up.lv++;
  if(up.isUnlock){
    up.on=true;
    // Activar todas las sub-mejoras cuyo unlock real (vía WEAPON_UNLOCK_KEY) sea esta clave
    Object.keys(U).forEach(k=>{if(U[k].isWeapon&&WEAPON_UNLOCK_KEY[U[k].isWeapon]===key) U[k].on=true;});
  }else if(up.isUpgUnlock){
    // Upgrade que también funciona como unlock (ej: Explosión al morir)
    up.v+=up.inc; up.on=true;
    up.cost=Math.floor(up.bc*Math.pow(up.sc,up.lv-1));
  }else{
    up.v+=up.inc;
    up.cost=Math.floor(up.bc*Math.pow(up.sc,up.lv-1));
    if(key==='towerHp') G.towerMaxHealth=up.v;
  }
  updateHUD(); renderShop();
}

document.querySelectorAll('.tab-btn').forEach(btn=>{

    btn.classList.add('active');

});

// ── RONDA ─────────────────────────────────────────────────────────────────────
function startRound(){
  G.towerMaxHealth=U.towerHp.v; G.towerHealth=G.towerMaxHealth;
  G.roundTimer=0; G.isRoundActive=true;
  G.spawnTimer=0; G.difficultyTime=0;
  G.totalDamageDealt=0; G.goldThisRound=0;
  G.auraTimer=0; G.tractorTimer=0; G.firelineTimer=0;
  G.baseTimer=0; G.shotgunTimer=0; G.sniperTimer=0; G.grenadeTimer=0;
  bossSpawned=false; bossEnemy=null;
  enemies=[]; particles=[]; damageTexts=[]; goldCoins=[]; lightningChains=[];
  projectiles=[]; grenades=[]; activeDrones=[]; bossProjectiles=[]; activeFireline=null; missiles=[]; missileTimer=0; orbitAngle=0;
  document.getElementById('shop-overlay').classList.add('hidden');
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('boss-bar-wrap').style.display='none';
  spawnSquad(); spawnSquad(); updateHUD(); renderShop();
}

function finishRound(victory=false){
  G.isRoundActive=false;
  const survived=G.roundTimer, goldEarned=G.goldThisRound, dmg=Math.floor(G.totalDamageDealt);
  const nb=survived>records.bestTime, ng=goldEarned>records.bestGold, nd=dmg>records.bestDamage;
  if(nb) records.bestTime=survived; if(ng) records.bestGold=goldEarned; if(nd) records.bestDamage=dmg;
  if(victory){
    gameLevel++;
    document.getElementById('round-title').innerText='¡NIVEL SUPERADO!';
    document.getElementById('round-title').style.color='#2ed573';
    document.getElementById('round-summary').innerText=`Has derrotado al Jefe del Nivel ${gameLevel-1}. Nivel ${gameLevel} desbloqueado.`;
  }else{
    document.getElementById('round-title').innerText='¡Torre Colapsada!';
    document.getElementById('round-title').style.color='#ff4757';
    document.getElementById('round-summary').innerText=`La horda destruyó el núcleo. (Nivel ${gameLevel})`;
  }
  const box=document.getElementById('round-stats-box'); box.innerHTML='';
  function card(l,v,best,rec){
    const d=document.createElement('div'); d.className='stat-card'+(best?' best':'');
    d.innerHTML=`<div class="sc-label">${l}</div><div class="sc-value">${v}</div><div class="sc-record">${best?'🏆 Nuevo récord':(rec>0?`Récord: ${rec}`:'')}</div>`;
    return d;
  }
  box.appendChild(card('Tiempo',formatTime(survived),nb,formatTime(records.bestTime)));
  box.appendChild(card('Oro',goldEarned+'🪙',ng,records.bestGold+'🪙'));
  box.appendChild(card('Daño',dmg.toLocaleString(),nd,records.bestDamage.toLocaleString()));
  document.getElementById('shop-overlay').classList.remove('hidden');
  renderShop(); updateHUD();
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.1)||.016; lastTime=ts;
  const shopOpen=!document.getElementById('shop-overlay').classList.contains('hidden');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2, cy=canvas.height/2, tr=35;

  if(!shopOpen){

  // Filtrar enemigos muertos al inicio del frame (antes del spawn) para que el guard
  // MAX_ENEMIES_ALIVE sea preciso y no se acumulen zombies entre frames.
  if(G.isRoundActive) enemies=enemies.filter(e=>e.hp>0);
  buildEnemyGrid();

  if(G.isRoundActive){
    G.roundTimer+=dt; G.spawnTimer+=dt; G.difficultyTime+=dt;
    if(!bossSpawned&&G.roundTimer>=30) spawnBoss();
    // Cooldown de spawn exponencialmente más corto con el tiempo, con suelo más bajo
    // para sostener oleadas casi continuas una vez la dificultad despega.
    const sqCD=Math.max(0.15, 3.0*Math.pow(0.90, G.difficultyTime))/Math.max(1, gameLevel*.5);
    if(G.spawnTimer>=sqCD){G.spawnTimer=0;spawnSquad();}
    // Armas activas
    G.baseTimer+=dt;
    if(G.baseTimer>=1/U.baseRate.v){G.baseTimer=0;fireBase();}
    if(U.unlockShotgun.on){G.shotgunTimer+=dt;if(G.shotgunTimer>=1/U.sgRate.v){G.shotgunTimer=0;fireShotgun();}}
    if(U.unlockSniper.on){G.sniperTimer+=dt;if(G.sniperTimer>=1/U.snRate.v){G.sniperTimer=0;fireSniper();}}
    if(U.unlockGrenade.on){G.grenadeTimer+=dt;if(G.grenadeTimer>=1/U.grRate.v){G.grenadeTimer=0;fireGrenade();}}
    tickTractor(dt);
    document.getElementById('diff-bar').style.width=`${Math.min((G.difficultyTime%30)/30*100,100)}%`;
    updateHUD();
  } else {
    // Aunque no estemos en ronda activa, seguir spawneando para que haya enemigos desde el inicio
    G.spawnTimer+=dt; G.difficultyTime=0;
    if(G.spawnTimer>=4){G.spawnTimer=0;spawnSquad();}
  }

  ctx.save();
  ctx.translate(cx,cy); ctx.scale(G.cameraZoom,G.cameraZoom); ctx.translate(-cx,-cy);
  if(G.screenShake>0){ctx.translate((Math.random()-.5)*G.screenShake,(Math.random()-.5)*G.screenShake);G.screenShake*=.88;if(G.screenShake<.2)G.screenShake=0;}

  // Torre
  ctx.beginPath(); ctx.arc(cx,cy,tr,0,Math.PI*2);
  ctx.fillStyle='#2c3a50'; ctx.strokeStyle='#00d2d3'; ctx.lineWidth=4; ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,tr*.6,0,Math.PI*2);
  const hpFrac=G.towerHealth/G.towerMaxHealth;
  const hpColor=hpFrac>0.5?'#10ac84':hpFrac>0.25?'#f9ca24':'#ff4757';
  ctx.fillStyle=G.towerHealth<15?`rgba(255,71,87,${Math.abs(Math.sin(ts*.01))})`:hpColor; ctx.fill();
  // HP en número dentro de la torre
  ctx.font=`bold ${Math.min(14,12+Math.floor(Math.log10(Math.max(1,G.towerMaxHealth))))}px Courier New`;
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=4;
  ctx.fillText(Math.ceil(G.towerHealth),cx,cy);
  ctx.shadowBlur=0;

  // Pasivas visuales
  tickAura(dt);
  tickDrones(dt,cx,cy);
  tickFireline(dt);
  drawCritZone();
  // Activas adicionales
  if(G.isRoundActive){
    tickMissile(dt);
    tickLaser(dt);
    tickOrbit(dt);
  }

  // Lightning chains
  lightningChains.forEach(c=>{
    ctx.save(); ctx.beginPath(); ctx.moveTo(c.x1,c.y1);
    ctx.lineTo((c.x1+c.x2)/2+(Math.random()*12-6),(c.y1+c.y2)/2+(Math.random()*12-6));
    ctx.lineTo(c.x2,c.y2);
    ctx.strokeStyle=`rgba(${hexToRgb(c.color)},${c.alpha})`; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
    c.alpha-=dt*4;
  });
  lightningChains=lightningChains.filter(c=>c.alpha>0);

  // Enemigos
  enemies.forEach(e=>{
    const d=e.update(cx,cy,dt);
    if(d<=(tr+e.radius)){
      e.hp=0;
      if(G.isRoundActive){G.towerHealth-=e.dmgToTower;G.screenShake=8;for(let i=0;i<5;i++)particles.push(new Particle(e.x,e.y,'#ff4757',1.2));}
    }else e.draw();
  });
  // (enemies ya fue filtrado al inicio del frame, no necesitamos filtrarlo de nuevo aquí)

  // Proyectiles jugador
  projectiles.forEach(p=>{
    p.update(); p.draw();
    if(!p.alive) return;
    const nearby=getNearbyEnemies(p.x,p.y,p.radius*1.8+24);
    for(let i=0;i<nearby.length;i++){
      const e=nearby[i];
      if(e.hp>0&&p.alive&&!p.hitEnemies.has(e)){
        const d=Math.sqrt((e.x-p.x)**2+(e.y-p.y)**2);
        if(d<=(e.radius+p.radius*1.8)){
          p.hitEnemies.add(e);
          dealDamage(e,p.damage,'');
          for(let k=0;k<2;k++) particles.push(new Particle(e.x,e.y,e.color,.8));
          if(p.bouncesLeft>0){p.bouncesLeft--;p.bounce(e);}
          else if(p.pierceLeft>0) p.pierceLeft--;
          else p.alive=false;
          if(!p.alive) break;
        }
      }
    }
  });
  projectiles=projectiles.filter(p=>p.alive);
  tickVoltArc(dt);

  // Proyectiles del jefe
  bossProjectiles.forEach(bp=>{
    bp.x+=bp.vx; bp.y+=bp.vy;
    if(bp.x<-50||bp.x>canvas.width+50||bp.y<-50||bp.y>canvas.height+50) bp.alive=false;
    // Daño a la torre
    const d=Math.sqrt((bp.x-cx)**2+(bp.y-cy)**2);
    if(d<=tr+bp.r){bp.alive=false;if(G.isRoundActive){G.towerHealth-=8;G.screenShake=4;}}
    ctx.beginPath(); ctx.arc(bp.x,bp.y,bp.r,0,Math.PI*2);
    ctx.fillStyle='#ff6b81'; ctx.shadowColor='#ff6b81'; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
  });
  bossProjectiles=bossProjectiles.filter(b=>b.alive);

  // Granadas
  grenades.forEach(g=>{g.update(dt);g.draw();});
  grenades=grenades.filter(g=>g.alive);

  if(G.isRoundActive){
    G.enemiesAlive=enemies.length;
    if(G.towerHealth<=0){G.towerHealth=0;finishRound(false);}
  }

  // Aplicar topes antes de actualizar para evitar crecimiento ilimitado con hordas masivas
  if(particles.length>MAX_PARTICLES) particles=particles.slice(-MAX_PARTICLES);
  if(goldCoins.length>MAX_GOLDCOINS){
    // Auto-recoger las más antiguas (llevan más tiempo flotando) dando el oro al jugador
    const excess=goldCoins.slice(0, goldCoins.length-MAX_GOLDCOINS);
    excess.forEach(c=>collectCoin(c.value));
    goldCoins=goldCoins.slice(goldCoins.length-MAX_GOLDCOINS);
  }
  if(damageTexts.length>MAX_DAMAGE_TEXTS) damageTexts=damageTexts.slice(-MAX_DAMAGE_TEXTS);
  particles.forEach(p=>{p.update();p.draw();}); particles=particles.filter(p=>p.alpha>0);
  goldCoins.forEach(c=>{c.update(dt);c.draw();}); goldCoins=goldCoins.filter(c=>c.alive);
  damageTexts.forEach(t=>{t.update();t.draw();}); damageTexts=damageTexts.filter(t=>t.alpha>0);

  ctx.restore();
  drawShadowLayer(cx,cy);
  } // end !shopOpen

  requestAnimationFrame(loop);
}

function hexToRgb(hex){
  if(hex.startsWith('rgba')||hex.startsWith('rgb')) return '0,210,211';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

document.getElementById('start-btn').onclick=()=>startRound();
document.getElementById('next-btn').onclick=()=>startRound();
window.onload=()=>{updateHUD();renderShop();spawnSquad();spawnSquad();};
requestAnimationFrame(loop);
</script>
